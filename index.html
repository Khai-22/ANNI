<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<title>Happy Anniversary Mi Amor</title>

<style>

body {

    margin: 0;

    font-family: Arial, sans-serif;

    background: #fff8d6;

    color: #5a4500;

    text-align: center;

}

/* Background image layer */

.bg {

    position: fixed;

    width: 100%;

    height: 100%;

    background: url("your-photo.jpg") center/cover no-repeat;

    filter: brightness(0.5);

    z-index: -1;

}

/* Container */

.container {

    padding-top: 100px;

}

/* Gift box */

.box {

    width: 150px;

    height: 150px;

    margin: 20px auto;

    background: gold;

    border-radius: 10px;

    position: relative;

    cursor: pointer;

    box-shadow: 0 10px 25px rgba(0,0,0,0.3);

}

.box:before {

    content: "🎁";

    font-size: 60px;

    position: absolute;

    top: 35px;

    left: 45px;

}

/* Input */

input {

    padding: 10px;

    border: 2px solid #d4af37;

    border-radius: 8px;

    margin-top: 20px;

}

/* Button */

button {

    padding: 10px 20px;

    margin-top: 10px;

    border: none;

    background: #ffd84d;

    cursor: pointer;

    font-weight: bold;

    border-radius: 8px;

}

/* Hidden message */

.message {

    display: none;

    margin-top: 30px;

    font-size: 22px;

    background: rgba(255, 215, 0, 0.2);

    padding: 20px;

    border-radius: 12px;

}

</style>

</head>

<body>

<div class="bg"></div>

<div class="container">

    <h1>Happy Anniversary Mi Amor 💛</h1>

    <p>To open your gift, enter our anniversary date</p>

    <input type="text" id="code" placeholder="DD.MM.YYYY">

    <br>

    <button onclick="checkCode()">Open Gift</button>

    <div class="box"></div>

    <div class="message" id="msg">

        Thank God For Her 💛<br>

        love you Chel

    </div>

</div>

<script>

function checkCode() {

    const input = document.getElementById("code").value;

    const message = document.getElementById("msg");

    if (input === "29.12.2020") {

        message.style.display = "block";

        document.querySelector(".box").style.transform = "scale(1.1)";

    } else {

        alert("Wrong code, try again 💛");

    }

}

</script>

</body>

</html>
